{% extends 'base.html' %}

{% block content %}

<div class="form-container">

    <form method="POST">

        {% csrf_token %}

        <h2>Verify OTP</h2>

        <h3>Your OTP: {{ demo_otp }}</h3>

        <input type="text"
        name="otp"
        placeholder="Enter OTP"
        required>

        <button type="submit">

            Verify OTP

        </button>

    </form>

</div>

{% endblock %}
