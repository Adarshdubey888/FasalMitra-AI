{% extends 'base.html' %}

{% block content %}

<div class="profile-container">

    <div class="profile-card">

        <h2>Farmer Profile</h2>

        <hr>

        <p>
            <strong>Name:</strong>
            {{ farmer.name }}
        </p>

        <p>
            <strong>Phone:</strong>
            {{ farmer.phone }}
        </p>

        <p>
            <strong>Village:</strong>
            {{ farmer.village }}
        </p>

        <p>
            <strong>State:</strong>
            {{ farmer.state }}
        </p>

        <p>
            <strong>Registered On:</strong>
            {{ farmer.created_at }}
        </p>
        <div class="div">

        <li class="" style="padding:5px">
            <a class="nav-link" style="color:black; text-align:center;" href="{% url 'logout' %}">
                Logout

        </li>

    </div>

</div>
